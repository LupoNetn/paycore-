<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="secondaryGradient" x1="512" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="120" fill="#0A0A0A" />
  
  <!-- Outer glowing ring fragment -->
  <path d="M120 256 A 136 136 0 0 1 392 256" stroke="url(#secondaryGradient)" stroke-width="24" stroke-linecap="round" fill="none" opacity="0.6" filter="url(#glow)" />
  <path d="M392 256 A 136 136 0 0 1 120 256" stroke="url(#primaryGradient)" stroke-width="12" stroke-linecap="round" fill="none" stroke-dasharray="100 200" opacity="0.4" />

  <!-- Core Element (The P) -->
  <path d="M 210 160 
           L 210 360 
           C 210 376 195 376 195 360
           L 195 160
           C 195 140 210 135 230 135
           L 290 135
           C 340 135 370 165 370 205
           C 370 245 340 275 290 275
           L 230 275" 
        fill="none" 
        stroke="url(#primaryGradient)" 
        stroke-width="40" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Inner P accent to make it pop -->
  <path d="M 210 160 
           L 210 275
           L 280 275
           C 310 275 330 255 330 220
           C 330 185 310 165 280 165
           L 210 165"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="12"
        stroke-linejoin="round"
        opacity="0.9" />

  <!-- A small futuristic data crystal in the middle -->
  <circle cx="270" cy="220" r="14" fill="#00FFD1" filter="url(#glow)" />
</svg>
